<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ELLMR — Security Browser · AI Agent Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* ---------- Base ---------- */
  *,*::before,*::after{box-sizing:border-box}
  :root{
    --bg-app:#F9F9F9;
    --bg-panel:#FFFFFF;
    --bg-panel-2:#F9F9F9;
    --bg-nav:#F2F2F3;
    --bg-secondary:#F4F4F4;
    --bg-active:#04000E;
    --bg-canvas:#F9F9F9;
    --bg-canvas-grid:#ECECEE;
    --border:#E5E5E8;
    --border-strong:#CDCCCF;
    --border-dark:#E5E5E8;
    --text:#1A1A1F;
    --text-dim:#6B6B76;
    --text-canvas:#1A1A1F;
    --text-canvas-dim:#6B6B76;
    --accent:#4272D7;        /* ELLMR primary blue */
    --accent-soft:#E8EFFB;
    --accent-2:#4272D7;
    --accent-agent:#4272D7;
    --accent-policy:#2C9461;
    --accent-fn:#D89622;
    --accent-cat:#B83D7A;
    --danger:#DC2626;
    --shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.05);
    --shadow-lg:0 8px 24px rgba(0,0,0,.08);
  }
  html,body{height:100%;margin:0;background:var(--bg-app);color:var(--text);font-family:'Inter',system-ui,-apple-system,sans-serif;font-size:13px;overflow:hidden}
  button{font:inherit;color:inherit}

  /* ---------- App layout ---------- */
  .app{display:grid;grid-template-rows:48px 1fr;height:100vh}
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 14px;background:#FFFFFF;border-bottom:1px solid var(--border);color:var(--text);
    gap:12px;
  }
  .brand{display:flex;align-items:center;gap:10px}
  .brand-mark{
    width:26px;height:26px;border-radius:7px;
    background:radial-gradient(circle at 30% 30%,#6593E5,#4272D7 55%,#2A52A8);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),0 0 0 1px rgba(66,114,215,.25);
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:11px;letter-spacing:.5px;
  }
  .brand-name{font-weight:600;letter-spacing:.2px}
  .brand-sub{color:var(--text-dim);font-size:12px;margin-left:6px}
  .topbar-center{display:flex;align-items:center;gap:8px;color:var(--text-dim)}
  .crumb{display:flex;align-items:center;gap:6px;font-size:12px}
  .crumb-sep{opacity:.4}
  .topbar-right{display:flex;align-items:center;gap:8px}
  .icon-btn{
    width:30px;height:30px;border-radius:7px;border:1px solid var(--border-strong);background:var(--bg-secondary);
    display:grid;place-items:center;cursor:pointer;color:var(--text);
  }
  .icon-btn:hover{background:#ECECEE}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:3px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent);border:1px solid #C7D5F3;font-size:11px}
  .dot{width:6px;height:6px;border-radius:50%;background:#2C9461;box-shadow:0 0 0 2px rgba(44,148,97,.18)}

  /* ---------- Main grid: iconNav | secondaryNav | layers | canvas | details ---------- */
  .workspace{display:grid;grid-template-columns:56px 208px 224px 1fr 0;min-height:0;background:var(--bg-app)}
  .workspace.right-open{grid-template-columns:56px 208px 224px 1fr 340px}

  /* ---------- Primary icon nav ---------- */
  .nav-primary{
    background:var(--bg-nav);border-right:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;
    color:var(--text-dim);
  }
  .nav-primary .np-btn{
    width:38px;height:38px;border-radius:9px;display:grid;place-items:center;cursor:pointer;
    background:transparent;border:0;color:var(--text-dim);position:relative;
  }
  .nav-primary .np-btn:hover{background:#ECECEE;color:var(--text)}
  .nav-primary .np-btn.active{background:var(--bg-active);color:#FFFFFF}
  .nav-primary .np-spacer{flex:1}
  .nav-primary .np-divider{width:24px;height:1px;background:var(--border-strong);margin:6px 0}

  /* ---------- Secondary nav ---------- */
  .nav-secondary{
    background:var(--bg-nav);border-right:1px solid var(--border);
    display:flex;flex-direction:column;min-height:0;color:var(--text);
  }
  .nav-secondary .ns-head{
    padding:14px 14px 8px;display:flex;flex-direction:column;gap:2px;
    border-bottom:1px solid var(--border);
  }
  .nav-secondary .ns-eyebrow{
    font-size:10.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--text-dim);
  }
  .nav-secondary .ns-title{
    font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:6px
  }
  .nav-secondary .ns-list{padding:8px 8px 12px;display:flex;flex-direction:column;gap:1px;overflow:auto;flex:1}
  .nav-secondary .ns-item{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;
    color:var(--text);font-size:13px;border:0;background:transparent;text-align:left;
  }
  .nav-secondary .ns-item:hover{background:#ECECEE}
  .nav-secondary .ns-item.active{background:var(--bg-active);color:#FFFFFF;font-weight:500}
  .nav-secondary .ns-item.active .ns-ico{color:#FFFFFF}
  .nav-secondary .ns-ico{width:16px;height:16px;display:inline-grid;place-items:center;color:var(--text-dim);flex:0 0 16px}
  .nav-secondary .ns-count{
    margin-left:auto;font-size:10.5px;color:var(--text-dim);background:var(--bg-secondary);border:1px solid var(--border-strong);
    padding:1px 7px;border-radius:999px;
  }
  .nav-secondary .ns-item.active .ns-count{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.25);color:#FFFFFF}
  .nav-secondary .ns-footer{
    padding:10px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:11.5px;
  }

  /* Left layers panel */
  .layers{
    background:var(--bg-panel);border-right:1px solid var(--border);
    display:flex;flex-direction:column;min-height:0;
  }
  .panel-head{
    padding:10px 12px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
  }
  .panel-title{font-weight:600;font-size:12px;letter-spacing:.3px;text-transform:uppercase;color:var(--text-dim)}
  .layers-search{
    margin:8px 10px 4px;display:flex;align-items:center;gap:6px;
    padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:var(--bg-panel-2);
  }
  .layers-search input{border:0;background:transparent;outline:none;flex:1;font:inherit;color:var(--text)}
  .layers-tree{flex:1;overflow:auto;padding:6px 4px 12px}
  .tree-item{
    display:flex;align-items:center;gap:6px;padding:4px 8px;border-radius:6px;cursor:pointer;
    user-select:none;color:var(--text);position:relative;
  }
  .tree-item:hover{background:#ECECEE}
  .tree-item.active{background:var(--accent-soft);color:var(--accent)}
  .tree-item .caret{width:14px;display:inline-grid;place-items:center;color:var(--text-dim);font-size:10px}
  .tree-item .ico{width:14px;height:14px;display:inline-grid;place-items:center;flex:0 0 14px}
  .tree-item .lbl{font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tree-item .count{margin-left:auto;font-size:10.5px;color:var(--text-dim)}
  .tree-children{padding-left:14px;display:none}
  .tree-children.open{display:block}
  .swatch{width:8px;height:8px;border-radius:2px;display:inline-block}
  .sw-ellmr{background:linear-gradient(135deg,#6593E5,#4272D7)}
  .sw-cat{background:var(--accent-cat)}
  .sw-agent{background:var(--accent-agent)}
  .sw-fn{background:var(--accent-fn)}
  .sw-policy{background:var(--accent-policy)}

  /* Canvas */
  .canvas-wrap{display:flex;flex-direction:column;min-width:0;min-height:0;position:relative}
  .canvas-area{position:relative;flex:1;min-height:0;display:flex}
  .tabs-bar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 14px;background:#FFFFFF;border-bottom:1px solid var(--border);color:var(--text);
  }
  .tabs{display:inline-flex;background:var(--bg-secondary);border:1px solid var(--border-strong);border-radius:9px;padding:3px;gap:2px}
  .tab{
    padding:6px 14px;border-radius:7px;border:0;background:transparent;color:var(--text-dim);cursor:pointer;
    font-weight:500;font-size:12.5px;display:inline-flex;align-items:center;gap:8px
  }
  .tab .pill{background:#FFFFFF;color:var(--text-dim);border:1px solid var(--border-strong);border-radius:999px;padding:1px 7px;font-size:10.5px}
  .tab.active{background:#FFFFFF;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.04);border:1px solid var(--border-strong)}
  .tab.active.agents{color:var(--accent)}
  .tab.active.policies{color:var(--accent-policy)}
  .canvas-tools{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:12px}
  .canvas-tools .icon-btn{width:28px;height:28px}
  .zoom-readout{padding:4px 10px;border-radius:6px;background:var(--bg-secondary);border:1px solid var(--border-strong);font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text)}
  .tabs-bar-mid{display:flex;align-items:center;gap:10px}

  /* View switcher (Sitemap / Table) */
  .view-switcher{
    display:inline-flex;background:var(--bg-secondary);border:1px solid var(--border-strong);border-radius:8px;padding:3px;gap:2px;
  }
  .view-switcher .vsw{
    padding:5px 10px;border-radius:6px;border:0;background:transparent;color:var(--text-dim);cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;
  }
  .view-switcher .vsw:hover{color:var(--text)}
  .view-switcher .vsw.active{background:#FFFFFF;color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.04);border:1px solid var(--border-strong)}

  /* Table view */
  .table-wrap{
    position:absolute;inset:0;display:flex;flex-direction:column;background:#FFFFFF;
    overflow:hidden;
  }
  .table-toolbar{
    display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--border);
    background:#FFFFFF;color:var(--text);flex-shrink:0;
  }
  .table-search{
    display:flex;align-items:center;gap:6px;padding:5px 9px;border:1px solid var(--border-strong);border-radius:7px;
    background:var(--bg-secondary);width:240px;
  }
  .table-search input{
    border:0;background:transparent;outline:none;flex:1;font:inherit;color:var(--text);font-size:12px;
  }
  .table-search input::placeholder{color:#9A9AA6}
  .table-toolbar .spacer{flex:1}
  .table-toolbar .pill-info{
    font-size:11.5px;color:var(--text-dim);padding:4px 9px;border-radius:999px;background:var(--bg-secondary);border:1px solid var(--border-strong);
  }
  .table-scroll{flex:1;overflow:auto}
  table.data-table{
    width:100%;border-collapse:separate;border-spacing:0;font-size:12.5px;color:var(--text);min-width:920px;
  }
  table.data-table thead th{
    position:sticky;top:0;background:var(--bg-secondary);color:var(--text-dim);font-weight:600;font-size:10.5px;
    letter-spacing:.6px;text-transform:uppercase;text-align:left;padding:10px 14px;
    border-bottom:1px solid var(--border);z-index:1;
  }
  table.data-table thead th .sort{margin-left:4px;color:#B0AFB3;font-size:10px}
  table.data-table tbody td{
    padding:11px 14px;border-bottom:1px solid #F0F0F2;vertical-align:middle;
  }
  table.data-table tbody tr{cursor:pointer;transition:background .12s ease}
  table.data-table tbody tr:hover{background:var(--bg-panel-2)}
  table.data-table tbody tr.selected{background:var(--accent-soft);box-shadow:inset 3px 0 0 0 var(--accent)}
  table.data-table tbody tr.selected:hover{background:#DDE8F8}
  table.data-table .row-num{color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:11px;width:36px}
  .cell-name{display:flex;align-items:center;gap:10px;min-width:200px}
  .cell-name .ic{
    width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:#fff;flex:0 0 28px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);
  }
  .cell-name .nm{font-weight:600;line-height:1.2;color:var(--text)}
  .cell-name .sb{font-size:11px;color:var(--text-dim);margin-top:1px}
  .cell-chip{
    display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;
    font-size:11px;background:var(--bg-secondary);border:1px solid var(--border);color:var(--text);white-space:nowrap;
  }
  .cell-chip.ok{color:#1F7A4F;border-color:#C6E6D5;background:#EDF7F1}
  .cell-chip.warn{color:#B07A0E;border-color:#F0DCAE;background:#FAF0DC}
  .cell-chip.crit{color:#B23B3B;border-color:#F2C4C4;background:#FBEAEA}
  .cell-chip.purple{color:var(--accent);border-color:#C7D5F3;background:var(--accent-soft)}
  .cell-chip.cyan{color:#1A6F8C;border-color:#BFE5F0;background:#E9F4F8}
  .cell-cat{color:var(--text);display:inline-flex;align-items:center;gap:6px}
  .cell-cat .swc{width:8px;height:8px;border-radius:2px;background:var(--accent-cat)}
  .cell-cat.policies .swc{background:var(--accent-policy)}
  .cell-mono{font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--text-dim)}
  .cell-actions{display:flex;gap:6px;justify-content:flex-end}
  .cell-actions .icon-btn{width:24px;height:24px;background:transparent;border:0;color:var(--text-dim)}
  .cell-actions .icon-btn:hover{background:#ECECEE;color:var(--text)}
  .stack-chips{display:flex;flex-wrap:wrap;gap:4px;max-width:280px}

  .canvas{
    flex:1;min-height:0;position:relative;overflow:auto;
    background:
      radial-gradient(ellipse at 50% 40%, rgba(66,114,215,.04), transparent 60%),
      var(--bg-canvas);
  }
  .grid-bg{
    position:absolute;inset:0;
    background-image:
      linear-gradient(to right, var(--bg-canvas-grid) 1px, transparent 1px),
      linear-gradient(to bottom, var(--bg-canvas-grid) 1px, transparent 1px);
    background-size:32px 32px;
    mask-image:radial-gradient(ellipse at center, #000 65%, transparent 100%);
    -webkit-mask-image:radial-gradient(ellipse at center, #000 65%, transparent 100%);
    opacity:.9;pointer-events:none;
  }
  .stage{
    position:relative;width:1180px;height:780px;margin:0 auto;
    transform-origin:0 0;
  }
  .edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible}

  .node{
    position:absolute;
    background:#FFFFFF;border:1px solid var(--border-strong);border-radius:12px;
    color:var(--text);width:220px;
    box-shadow:var(--shadow);
    cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease;
  }
  .node:hover{transform:translateY(-1px);border-color:#B0AFB3;box-shadow:0 6px 18px rgba(0,0,0,.08)}
  .node.selected{
    border-color:var(--accent);box-shadow:0 0 0 3px rgba(66,114,215,.16),0 8px 22px rgba(66,114,215,.18);
  }
  .node-head{
    display:flex;align-items:center;gap:8px;padding:9px 11px;
  }
  .node.has-meta .node-head, .node.has-body .node-head{border-bottom:1px solid var(--border)}
  .node-ico{
    width:24px;height:24px;border-radius:6px;display:grid;place-items:center;color:#fff;flex:0 0 24px;
  }
  .node-title{font-weight:600;font-size:12.5px;letter-spacing:.2px;line-height:1.2;color:var(--text)}
  .node-sub{color:var(--text-dim);font-size:11px;margin-top:1px}
  .node-head .titles{flex:1;min-width:0}
  .node-head .titles .node-title,.node-head .titles .node-sub{
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .node-chevron{
    margin-left:auto;display:grid;place-items:center;width:22px;height:22px;border-radius:5px;
    color:var(--text-dim);cursor:pointer;border:0;background:transparent;flex:0 0 22px;
  }
  .node-chevron:hover{background:#ECECEE;color:var(--text)}
  .node-chevron svg{transition:transform .15s ease}
  .node.collapsed .node-chevron svg{transform:rotate(-90deg)}
  .node-body{padding:9px 11px;display:flex;flex-direction:column;gap:6px}
  .node-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .chip{
    font-size:10.5px;padding:2px 7px;border-radius:999px;
    background:var(--bg-secondary);border:1px solid var(--border);color:var(--text);
  }
  .chip.ok{color:#1F7A4F;border-color:#C6E6D5;background:#EDF7F1}
  .chip.warn{color:#B07A0E;border-color:#F0DCAE;background:#FAF0DC}
  .chip.crit{color:#B23B3B;border-color:#F2C4C4;background:#FBEAEA}
  .chip.purple{color:var(--accent);border-color:#C7D5F3;background:var(--accent-soft)}
  .chip.cyan{color:#1A6F8C;border-color:#BFE5F0;background:#E9F4F8}
  .chip.count{
    color:var(--text-dim);border-color:var(--border-strong);background:#FFFFFF;
    display:inline-flex;align-items:center;gap:4px;
  }

  /* "+N more / Show less" toggle card at the bottom of a truncated column */
  .col-more{
    position:absolute;width:220px;
    background:#FFFFFF;border:1px dashed var(--border-strong);border-radius:10px;
    padding:9px 12px;color:var(--text-dim);cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;font-size:12px;font-weight:500;
    transition:all .12s ease;box-sizing:border-box;
  }
  .col-more:hover{
    border-color:var(--accent);background:var(--accent-soft);color:var(--accent);border-style:solid;
  }
  .col-more .cm-plus{
    font-weight:600;color:var(--accent);
    background:var(--accent-soft);border:1px solid #C7D5F3;
    padding:1px 8px;border-radius:999px;font-size:11px;
  }
  .col-more:hover .cm-plus{
    background:#FFFFFF;border-color:var(--accent);
  }
  .col-more.expanded{color:var(--text-dim);border-style:dashed}
  .col-more .cm-ico{display:grid;place-items:center;color:inherit;width:14px;height:14px}

  /* Inline children list inside expanded nodes */
  .node-children{
    border-top:1px solid var(--border);padding:6px 6px 8px;display:flex;flex-direction:column;gap:2px;
    background:#FAFAFB;border-radius:0 0 12px 12px;
  }
  .node-children .nc-head{
    padding:4px 8px 6px;font-size:10px;letter-spacing:.6px;text-transform:uppercase;
    color:var(--text-dim);display:flex;align-items:center;justify-content:space-between;
  }
  .node-children .nc-row{
    display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:6px;cursor:pointer;
    color:var(--text);font-size:12px;
  }
  .node-children .nc-row:hover{background:#ECECEE}
  .node-children .nc-row.selected{background:var(--accent-soft);color:var(--accent)}
  .node-children .nc-row .nc-dot{width:6px;height:6px;border-radius:2px;background:var(--accent-fn);flex:0 0 6px}
  .node-children .nc-row[data-type="agent"] .nc-dot{background:var(--accent-agent)}
  .node-children .nc-row[data-type="policy"] .nc-dot{background:var(--accent-policy)}
  .node-children .nc-row .nc-lbl{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}

  /* Node variants */
  .node.ellmr{
    width:240px;background:#FFFFFF;
    border-color:var(--accent);
    box-shadow:0 0 0 1px rgba(66,114,215,.2),0 12px 30px rgba(66,114,215,.12);
  }
  .node.ellmr .node-ico{background:linear-gradient(135deg,#6593E5,#4272D7)}
  .node.category .node-ico{background:linear-gradient(135deg,#D169A1,#B83D7A)}
  .node.agent .node-ico{background:linear-gradient(135deg,#6593E5,#4272D7)}
  .node.function .node-ico{background:linear-gradient(135deg,#E8B14A,#D89622)}
  .node.policy .node-ico{background:linear-gradient(135deg,#5BB689,#2C9461)}
  .node.category{width:220px}

  /* Connector port dots */
  .port{position:absolute;width:8px;height:8px;border-radius:50%;background:#FFFFFF;border:1.5px solid var(--border-strong)}
  .port.top{top:-5px;left:50%;transform:translateX(-50%)}
  .port.bottom{bottom:-5px;left:50%;transform:translateX(-50%)}
  .node.selected .port{border-color:var(--accent);background:var(--accent)}

  /* Floating toolbar bottom */
  .canvas-floating{
    position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
    display:flex;align-items:center;gap:6px;padding:6px;background:#FFFFFF;border:1px solid var(--border-strong);
    border-radius:10px;box-shadow:var(--shadow-lg);color:var(--text);
  }
  .canvas-floating .icon-btn{width:30px;height:30px}
  .legend{
    position:absolute;right:14px;top:14px;background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
    border:1px solid var(--border-strong);border-radius:10px;padding:10px 12px;color:var(--text);font-size:11.5px;
    display:flex;flex-direction:column;gap:6px;min-width:170px;box-shadow:var(--shadow);
  }
  .legend .lg-row{display:flex;align-items:center;gap:8px}
  .legend .sq{width:10px;height:10px;border-radius:3px}

  /* ---------- Right detail panel ---------- */
  .details{
    background:var(--bg-panel);border-left:1px solid var(--border);
    display:flex;flex-direction:column;min-height:0;overflow:hidden;
    transition:transform .25s ease;
  }
  .workspace:not(.right-open) .details{transform:translateX(100%);width:0}
  .det-head{padding:14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px}
  .det-ico{
    width:36px;height:36px;border-radius:9px;display:grid;place-items:center;color:#fff;flex:0 0 36px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
  }
  .det-title{font-weight:700;font-size:15px;line-height:1.2}
  .det-sub{color:var(--text-dim);font-size:12px;margin-top:2px}
  .det-close{margin-left:auto;background:transparent;border:0;cursor:pointer;color:var(--text-dim);font-size:18px;padding:2px 6px;border-radius:6px}
  .det-close:hover{background:#ECECEE;color:var(--text)}
  .det-body{padding:12px 14px;overflow:auto;display:flex;flex-direction:column;gap:14px}
  .det-section h4{margin:0 0 6px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim)}
  .det-section p{margin:0;line-height:1.5;color:var(--text)}
  .kv{display:grid;grid-template-columns:110px 1fr;gap:6px 10px;font-size:12.5px}
  .kv .k{color:var(--text-dim)}
  .kv .v{color:var(--text);font-weight:500}
  .tag-row{display:flex;flex-wrap:wrap;gap:6px}
  .tag{
    font-size:11px;padding:3px 8px;border-radius:999px;
    background:var(--bg-secondary);border:1px solid var(--border);color:var(--text)
  }
  .tag.ok{background:#EDF7F1;border-color:#C6E6D5;color:#1F7A4F}
  .tag.warn{background:#FAF0DC;border-color:#F0DCAE;color:#B07A0E}
  .tag.purple{background:var(--accent-soft);border-color:#C7D5F3;color:var(--accent)}
  .tag.cyan{background:#E9F4F8;border-color:#BFE5F0;color:#1A6F8C}
  .det-actions{display:flex;gap:8px;padding:12px 14px;border-top:1px solid var(--border);background:var(--bg-panel-2)}
  .btn{
    border:1px solid var(--border-strong);background:var(--bg-secondary);border-radius:8px;padding:7px 12px;cursor:pointer;font-weight:500;color:var(--text);
  }
  .btn:hover{background:#ECECEE}
  .btn.primary{background:#FFFFFF;color:var(--accent);border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent-soft)}
  .btn.ghost{background:transparent;border-color:transparent;color:var(--text-dim)}
  .btn.ghost:hover{background:#ECECEE;color:var(--text)}
  .conn-list{display:flex;flex-direction:column;gap:6px}
  .conn{
    display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--border);
    border-radius:8px;background:#FFFFFF;cursor:pointer;
  }
  .conn:hover{background:var(--bg-panel-2);border-color:var(--border-strong)}
  .conn .ic{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;color:#fff;flex:0 0 22px}
  .conn .nm{font-weight:500;font-size:12.5px;color:var(--text)}
  .conn .tp{font-size:11px;color:var(--text-dim);margin-left:auto}

  /* Icons (inline SVG via class) */
  .svg{width:14px;height:14px;display:inline-block}
  .svg-lg{width:18px;height:18px}

  /* Status footer */
  .status{
    position:absolute;left:14px;bottom:14px;
    background:rgba(255,255,255,.95);backdrop-filter:blur(8px);
    border:1px solid var(--border-strong);border-radius:10px;padding:8px 12px;color:var(--text);font-size:11.5px;
    display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);
  }

  /* Scrollbars */
  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:8px;border:2px solid transparent;background-clip:padding-box}
  ::-webkit-scrollbar-thumb:hover{background:#B0AFB3;background-clip:padding-box;border:2px solid transparent}
</style>
</head>
<body>
<div class="app">
  <!-- ============ TOP BAR ============ -->
  <header class="topbar">

        <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.16.66.42.86.74"/></svg>

      <div style="width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#fbbf24,#f59e0b);display:grid;place-items:center;color:#fff;font-weight:600;font-size:12px">FC</div>
    </div>
  </header>

  <!-- ============ WORKSPACE ============ -->
  <main class="workspace" id="workspace">
    <!-- LEFT 1: PRIMARY ICON NAV -->
    <nav class="nav-primary" aria-label="Primary navigation">

      </button>
      <button class="np-btn" title="Activity">

      </button>
      <button class="np-btn" title="Settings">
        <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4.6a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.36.16.66.42.86.74"/></svg>
      </button>

    <!-- LEFT 2: SECONDARY NAV -->

    <!-- LEFT 3: LAYERS -->

    <!-- CENTER: CANVAS -->

        <div class="table-wrap" id="tableView" style="display:none">
          <div class="table-toolbar">
            <div class="table-search">
              <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:#666670"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input id="tableSearch" placeholder="Search by name, category, model…" />
            </div>
            <span class="pill-info" id="tableInfo">—</span>
            <span class="spacer"></span>
            <button class="icon-btn" title="Filter">
              <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>

            <button class="icon-btn" title="Group by category">
              <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
            </button>
            <button class="icon-btn" title="Export">
              <svg class="svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            </button>
          </div>
          <div class="table-scroll">
            <table class="data-table" id="dataTable">
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </div>

        <div class="legend">
          <div class="lg-row"><span class="sq" style="background:linear-gradient(135deg,#a78bfa,#7b5cff)"></span> ELLMR Core</div>
          <div class="lg-row" data-tag="category"><span class="sq" style="background:#ec4899"></span> Category</div>
          <div class="lg-row" data-tag="agent"><span class="sq" style="background:#7b5cff"></span> AI Agent</div>
          <div class="lg-row" data-tag="function"><span class="sq" style="background:#f59e0b"></span> Function</div>
          <div class="lg-row" data-tag="policy" style="display:none"><span class="sq" style="background:#22c55e"></span> Policy</div>
        </div>

        <div class="status">
          <span class="dot"></span>
          <span id="statusText">AI Agents view · 3 categories · 6 agents · 12 functions</span>
        </div>

    ['pcat-compliance','pol-vendor','Vendor Risk','3rd-party','Medium','Audit',['ag-vault']],
    ['pcat-compliance','pol-backup','Backup Recovery','Continuity','Medium','Audit',['ag-arch']],
    ['pcat-compliance','pol-pentest','Penetration Test','Red team','High','Audit',['ag-vuln','ag-threat']],
    ['pcat-compliance','pol-quarter','Quarterly Review','Periodic audit','Low','Audit',['ag-audit']],
  ];

  morePolicies.forEach(([catId, id, name, subtitle, severity, enforcement, appliesTo])=>{
    const sevCls = severity==='Critical' ? 'crit' : (severity==='High' ? 'warn' : (severity==='Medium' ? 'cyan' : ''));
    DATA.policies[id] = {
      id, name, subtitle, icon: ICON.shield, category: catId,
      description: `${name} — ${subtitle}. Enforced across ELLMR-managed flows by upstream agents.`,
      meta: {
        Severity: severity,
        Enforcement: enforcement,
        Owner: ['Security','Privacy','Compliance'][Math.floor(Math.random()*3)],
        'Last updated': `${Math.floor(Math.random()*30)+1} days ago`
      },

      enforcedBy: appliesTo.slice(0,1),
      appliesTo
    };
    const cat = DATA.policyCategories.find(c=>c.id===catId);
    if(cat) cat.policies.push(id);
  });
})();

/* =========================================================
   STATE
   ========================================================= */
const state = {
  view:'agents',           // 'agents' | 'policies'
  canvasView:'sitemap',    // 'sitemap' | 'table'
  selected:null,           // id of selected node (or null)
  zoom:1,
  tableFilter:'',
  // IDs that are COLLAPSED on the canvas. For ellmr/categories this hides
  // their downstream cards; for agents/policies it hides their inline children.
  collapsed:new Set([
    ...Object.keys(DATA.agents),
    ...Object.keys(DATA.policies)
  ]),
  // Category IDs whose column is fully expanded (showing ALL items instead of
  // just the first MAX_VISIBLE_PER_COL + a "+N more" toggle).
  expandedCols:new Set(),
  expandedTree:new Set(['ellmr','cat-hr','cat-sec','cat-doc','pcat-access','pcat-privacy','pcat-compliance'])
};

const MAX_VISIBLE_PER_COL = 4;

function toggleCollapse(id){
  if(state.collapsed.has(id)) state.collapsed.delete(id);
  else state.collapsed.add(id);
  renderMain();
}
function toggleColumnExpansion(catId){
  if(state.expandedCols.has(catId)) state.expandedCols.delete(catId);
  else state.expandedCols.add(catId);
  renderMain();
}

/* =========================================================
   LAYOUT (positions per view)
   ========================================================= */
function getNodes(){
  // Column-based vertical layout — each category owns a column; items stack
  // vertically; expanding an item grows its card downward inline (no overflow).
  const STAGE_W = 940;
  const colCenter = (i, n)=> {
    // Center each column based on column count
    const usable = STAGE_W - 60;            // padding
    const colW   = usable / Math.max(1, n);
    return 30 + colW * (i + 0.5);
  };

  const ellmrW = 240;
  const ellmr = {...DATA.ellmr, x: STAGE_W/2 - ellmrW/2, y: 20};

  const result = {ellmr, cats:[], items:[], moreButtons:[], stageW:STAGE_W, stageH:200};

  // ELLMR collapsed → only show ELLMR
  if(state.collapsed.has('ellmr')) return result;

  const isAgents     = state.view === 'agents';
  const categories   = isAgents ? DATA.agentCategories : DATA.policyCategories;
  const childrenKey  = isAgents ? 'agents' : 'policies';
  const dataMap      = isAgents ? DATA.agents : DATA.policies;
  const itemType     = isAgents ? 'agent' : 'policy';
  const cN = categories.length;

  // Categories row at y=170
  const catW = 220;
  result.cats = categories.map((c,i)=>({
    ...c, type:'category',
    x: colCenter(i, cN) - catW/2, y: 170
  }));

  // Items per column — estimate height per item and stack with gaps
  const itemW = 220;
  const GAP = 14;
  const HEAD_H = 50;        // node head height
  const META_H = 30;        // meta row (chips / count)
  const NC_HEAD_H = 30;     // inline children header
  const NC_ROW_H = 26;      // each inline child row
  const NC_PAD = 10;

  let maxBottom = 250;

  categories.forEach((c, ci)=>{
    if(state.collapsed.has(c.id)){ maxBottom = Math.max(maxBottom, 260); return; }

    const allIds = c[childrenKey];
    const isColExpanded = state.expandedCols.has(c.id);
    const truncated = !isColExpanded && allIds.length > MAX_VISIBLE_PER_COL;
    const visibleIds = truncated ? allIds.slice(0, MAX_VISIBLE_PER_COL) : allIds;
    const hiddenCount = allIds.length - visibleIds.length;

    let cy = 290;
    visibleIds.forEach((id)=>{
      const item = dataMap[id]; if(!item) return;
      const isItemCollapsed = state.collapsed.has(id);

      // Estimate height
      let h = HEAD_H + META_H;     // header + meta row (chips/count)
      if(!isItemCollapsed){
        const numChildren = isAgents
          ? (item.functions || []).length
          : (item.appliesTo || []).length;
        h = HEAD_H + NC_HEAD_H + numChildren * NC_ROW_H + NC_PAD;
      }

      result.items.push({
        ...item, type:itemType,
        x: colCenter(ci, cN) - itemW/2, y: cy,
        _estH: h
      });
      cy += h + GAP;
    });

    // Emit "+N more" / "Show less" toggle if applicable
    if(truncated || (isColExpanded && allIds.length > MAX_VISIBLE_PER_COL)){
      result.moreButtons.push({
        categoryId: c.id,
        hiddenCount,
        expanded: isColExpanded,
        kind: itemType,
        x: colCenter(ci, cN) - 110, // 220-wide
        y: cy
      });
      cy += 44; // button height + spacing
    }

    maxBottom = Math.max(maxBottom, cy);
  });

  result.stageH = Math.max(560, maxBottom + 30);
  return result;
}

const stage = document.getElementById('stage');

function renderMain(){
  const isTable = state.canvasView === 'table';
  document.getElementById('canvas').style.display = isTable ? 'none' : '';
  document.getElementById('tableView').style.display = isTable ? 'flex' : 'none';
  // Hide canvas-only overlays in table mode
  document.querySelector('.legend').style.display = isTable ? 'none' : '';
  document.querySelector('.canvas-floating').style.display = isTable ? 'none' : '';
  // Hide zoom controls in table view
  document.querySelectorAll('.canvas-tools .icon-btn').forEach(el=>{

      el.style.display = isTable ? 'none' : '';
    }
  });
  document.getElementById('zoomReadout').style.display = isTable ? 'none' : '';

  if(isTable){
    renderTable();
  } else {
    renderCanvas();
  }
}

/* =========================================================
   RENDER CANVAS
   ========================================================= */

function svgIcon(id, cls='svg'){
  return `<svg class="${cls}"><use href="#${id}"/></svg>`;
}

function nodeHTML(n){
  const isCollapsible = (n.type==='core' || n.type==='category' || n.type==='agent' || n.type==='policy');
  const isCollapsed = isCollapsible && state.collapsed.has(n.id);

  // Inline children for expanded agents (functions) and policies (applies-to)
  let inlineChildren = '';
  if(!isCollapsed){
    if(n.type==='agent' && n.functions && n.functions.length){
      inlineChildren = `
        <div class="node-children">
          <div class="nc-head"><span>Functions</span><span>${n.functions.length}</span></div>
          ${n.functions.map(fn=>`
            <div class="nc-row ${state.selected===fn.id?'selected':''}" data-id="${fn.id}" data-type="function" onclick="event.stopPropagation();selectNode('${fn.id}','function')">
              <span class="nc-dot"></span>
              <span class="nc-lbl">${fn.name}</span>
            </div>
          `).join('')}
        </div>`;
    } else if(n.type==='policy' && n.appliesTo && n.appliesTo.length){
      inlineChildren = `
        <div class="node-children">
          <div class="nc-head"><span>Applies to</span><span>${n.appliesTo.length}</span></div>
          ${n.appliesTo.map(aid=>{
            const a = DATA.agents[aid]; if(!a) return '';
            return `
              <div class="nc-row ${state.selected===a.id?'selected':''}" data-id="${a.id}" data-type="agent" onclick="event.stopPropagation();selectNode('${a.id}','agent')">
                <span class="nc-dot" style="background:var(--accent-agent)"></span>
                <span class="nc-lbl">${a.name}</span>
              </div>`;
          }).join('')}
        </div>`;
    }
  }

  // Chevron toggle (only on collapsible nodes)
  const chevron = isCollapsible ? `
    <button class="node-chevron" title="${isCollapsed?'Expand':'Collapse'}" onclick="event.stopPropagation();toggleCollapse('${n.id}')">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </button>` : '';

  // Count chip when collapsed — hints at hidden content
  let countChip = '';
  if(isCollapsed){
    if(n.type==='core'){
      const ks = state.view==='agents' ? DATA.agentCategories.length : DATA.policyCategories.length;
      countChip = `<span class="chip count">${ks} categories</span>`;
    } else if(n.type==='category'){
      if(n.agents) countChip = `<span class="chip count">${n.agents.length} agents</span>`;
      else if(n.policies) countChip = `<span class="chip count">${n.policies.length} policies</span>`;
    } else if(n.type==='agent' && n.functions){
      countChip = `<span class="chip count">${n.functions.length} functions</span>`;
    } else if(n.type==='policy' && n.appliesTo){
      countChip = `<span class="chip count">${n.appliesTo.length} agents</span>`;
    }
  }

  const sub = n.subtitle ? `<div class="node-sub">${n.subtitle}</div>` : '';
  const tagChips = (n.tags||[]).slice(0,2).map(t=>`<span class="chip ${t.cls||''}">${t.label}</span>`).join('');
  const meta = (tagChips || countChip) ? `<div class="node-meta">${tagChips}${countChip}</div>` : '';

  const cls = [
    'node',
    n.type==='core'?'ellmr':n.type,
    isCollapsible ? (isCollapsed?'collapsed':'expanded') : '',
    state.selected===n.id ? 'selected' : '',
    meta ? 'has-meta' : '',
    inlineChildren ? 'has-body' : ''
  ].filter(Boolean).join(' ');

  return `
    <div class="${cls}"
         data-id="${n.id}" data-type="${n.type}"
         style="left:${n.x}px;top:${n.y}px"
         onclick="selectNode('${n.id}','${n.type}')">
      <span class="port top"></span>
      <span class="port bottom"></span>
      <div class="node-head">
        <div class="node-ico">${svgIcon(n.icon||ICON.bot,'svg')}</div>
        <div class="titles">
          <div class="node-title">${n.name}</div>
          ${sub}
        </div>
        ${chevron}
      </div>
      ${meta?`<div class="node-body">${meta}</div>`:''}
      ${inlineChildren}
    </div>
  `;
}

function truncate(s,n){ s=s||''; return s.length>n ? s.slice(0,n-1)+'…' : s; }

function moreButtonHTML(mb){
  const lbl = mb.kind==='agent' ? 'agents' : 'policies';
  if(mb.expanded){
    return `

function renderCanvas(){
  const {ellmr, cats, items, moreButtons, stageW, stageH} = getNodes();
  let html = '';
  html += nodeHTML(ellmr);
  cats.forEach(c=>html+=nodeHTML(c));
  items.forEach(it=>html+=nodeHTML(it));
  (moreButtons||[]).forEach(mb=>html+=moreButtonHTML(mb));
  stage.innerHTML = html;
  stage.style.width = stageW + 'px';
  stage.style.height = stageH + 'px';

  // Edges (drawn after layout so we can measure)
  requestAnimationFrame(drawEdges);

  // Status + counts
  if(state.view==='agents'){
    const totalFns = Object.values(DATA.agents).reduce((s,a)=>s + a.functions.length, 0);
    document.getElementById('statusText').textContent =
      `AI Agents view · ${cats.length} categories · ${items.length} agents · ${totalFns} functions`;
    document.querySelector('.legend [data-tag="agent"]').style.display='';
    document.querySelector('.legend [data-tag="function"]').style.display='';
    document.querySelector('.legend [data-tag="policy"]').style.display='none';
  } else {
    const totalBindings = Object.values(DATA.policies).reduce((s,p)=>s + p.appliesTo.length, 0);
    document.getElementById('statusText').textContent =
      `Policies view · ${cats.length} categories · ${items.length} policies · ${totalBindings} bindings`;
    document.querySelector('.legend [data-tag="agent"]').style.display='';
    document.querySelector('.legend [data-tag="function"]').style.display='none';
    document.querySelector('.legend [data-tag="policy"]').style.display='';
  }

  document.getElementById('cntAgents').textContent = Object.keys(DATA.agents).length;
  document.getElementById('cntPolicies').textContent = Object.keys(DATA.policies).length;
}

/* ---------- Edge drawing (vertical) ---------- */
function drawEdges(){
  edges.innerHTML = '';
  // Size SVG to match stage dimensions
  edges.setAttribute('viewBox', `0 0 ${stage.offsetWidth} ${stage.offsetHeight}`);
  edges.style.width = stage.offsetWidth + 'px';
  edges.style.height = stage.offsetHeight + 'px';

  const ellmrEl = stage.querySelector('[data-id="ellmr"]');
  if(!ellmrEl) return;

  const stageRect = stage.getBoundingClientRect();
  function anchor(el, side){
    const r = el.getBoundingClientRect();
    const x = (r.left + r.right)/2 - stageRect.left;
    const y = side==='bottom' ? r.bottom - stageRect.top : r.top - stageRect.top;
    return {x,y};
  }
  function edge(a,b,opts={}){
    const p1 = anchor(a,'bottom');
    const p2 = anchor(b,'top');
    const dy = Math.max(28,(p2.y - p1.y)*0.55);
    const d = `M ${p1.x},${p1.y} C ${p1.x},${p1.y+dy} ${p2.x},${p2.y-dy} ${p2.x},${p2.y}`;
    const path = document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d',d);
    path.setAttribute('fill','none');
    path.setAttribute('stroke',opts.color||'#CDCCCF');
    path.setAttribute('stroke-width',opts.w||1.5);
    if(opts.dash) path.setAttribute('stroke-dasharray','4 4');
    path.setAttribute('opacity',opts.opacity||0.7);
    edges.appendChild(path);
  }

  // Skip all edges if ELLMR is collapsed
  if(state.collapsed.has('ellmr')) return;

  const isAgents    = state.view === 'agents';
  const categories  = isAgents ? DATA.agentCategories : DATA.policyCategories;
  const childrenKey = isAgents ? 'agents' : 'policies';
  const trunkColor  = '#4272D7';
  const branchColor = isAgents ? '#4272D7' : '#2C9461';

  categories.forEach(c=>{
    const cEl = stage.querySelector(`[data-id="${c.id}"]`);
    if(!cEl) return;
    edge(ellmrEl, cEl, {color:trunkColor, w:1.5, opacity:.45});

    if(state.collapsed.has(c.id)) return;
    // Only draw edges to items currently rendered in the column
    c[childrenKey].forEach(id=>{
      const iEl = stage.querySelector(`[data-id="${id}"]`);
      if(iEl) edge(cEl, iEl, {color:branchColor, w:1.3, opacity:.4});
    });
  });
}

/* =========================================================
   LAYERS TREE
   ========================================================= */
function renderTree(){

  let html = '';
  // Root: ELLMR
  html += treeRow({id:'ellmr', name:'ELLMR · AI Agent', sw:'sw-ellmr', hasChildren:true, depth:0});

  if(state.view==='agents'){

      html += `<div class="tree-children ${state.expandedTree.has(c.id)?'open':''}" data-parent="${c.id}">`;
      c.agents.forEach(aid=>{
        const a = DATA.agents[aid];
        html += treeRow({id:a.id, name:a.name, sw:'sw-agent', hasChildren:true, depth:2, count:a.functions.length});
        html += `<div class="tree-children ${state.expandedTree.has(a.id)?'open':''}" data-parent="${a.id}">`;
        a.functions.forEach(fn=>{
          html += treeRow({id:fn.id, name:fn.name, sw:'sw-fn', hasChildren:false, depth:3});
        });
        html += `</div>`;
      });
      html += `</div>`;
    });
  } else {
    DATA.policyCategories.forEach(c=>{
      html += treeRow({id:c.id, name:c.name, sw:'sw-cat', hasChildren:true, depth:1, count:c.policies.length});
      html += `<div class="tree-children ${state.expandedTree.has(c.id)?'open':''}" data-parent="${c.id}">`;
      c.policies.forEach(pid=>{
        const p = DATA.policies[pid];
        html += treeRow({id:p.id, name:p.name, sw:'sw-policy', hasChildren:true, depth:2, count:p.appliesTo.length});
        html += `<div class="tree-children ${state.expandedTree.has(p.id)?'open':''}" data-parent="${p.id}">`;
        p.appliesTo.forEach(aid=>{
          const a = DATA.agents[aid];
          html += treeRow({id:`${p.id}__${a.id}`, name:a.name, sw:'sw-agent', hasChildren:false, depth:3, realId:a.id});
        });
        html += `</div>`;
      });
      html += `</div>`;
    });
  }
  html += `</div>`;
  tree.innerHTML = html;

  // Bind clicks
  tree.querySelectorAll('.tree-item').forEach(el=>{
    el.addEventListener('click',(e)=>{
      const id = el.dataset.id;
      const realId = el.dataset.realId || id;
      // Toggle expand on caret OR if has children
      const caret = el.querySelector('.caret');
      const hasChildren = caret && !caret.classList.contains('empty');
      if(e.target.closest('.caret') && hasChildren){
        toggleExpand(id);
        return;
      }
      // Select the node
      const node = resolveNode(realId);
      if(node){
        selectNode(realId, node.type);
      } else {
        toggleExpand(id);
      }
    });
  });
}
function treeRow({id, name, sw, hasChildren, depth, count, realId}){
  const open = state.expandedTree.has(id);
  return `
    <div class="tree-item ${state.selected===(realId||id)?'active':''}" data-id="${id}" ${realId?`data-real-id="${realId}"`:''}>
      <span class="caret ${hasChildren?'':'empty'}">${hasChildren?(open?'▾':'▸'):''}</span>
      <span class="ico"><span class="swatch ${sw}"></span></span>
      <span class="lbl">${name}</span>
      ${count!==undefined?`<span class="count">${count}</span>`:''}
    </div>
  `;
}
function toggleExpand(id){
  if(state.expandedTree.has(id)) state.expandedTree.delete(id);
  else state.expandedTree.add(id);
  renderTree();
}
function expandAll(){
  state.expandedTree = new Set();
  // Add all ids
  state.expandedTree.add('ellmr');
  DATA.agentCategories.forEach(c=>{state.expandedTree.add(c.id); c.agents.forEach(a=>state.expandedTree.add(a))});
  DATA.policyCategories.forEach(c=>{state.expandedTree.add(c.id); c.policies.forEach(p=>state.expandedTree.add(p))});
  renderTree();
}
function collapseAll(){
  state.expandedTree = new Set(['ellmr']);
  renderTree();
}

/* =========================================================
   NODE RESOLUTION
   ========================================================= */
function resolveNode(id){
  if(!id) return null;
  if(id==='ellmr') return {...DATA.ellmr, type:'core'};
  const cat = DATA.agentCategories.find(c=>c.id===id);
  if(cat) return {...cat, type:'category', isPolicy:false};
  const pcat = DATA.policyCategories.find(c=>c.id===id);
  if(pcat) return {...pcat, type:'category', isPolicy:true};
  if(DATA.agents[id]) return {...DATA.agents[id], type:'agent'};
  if(DATA.policies[id]) return {...DATA.policies[id], type:'policy'};
  for(const a of Object.values(DATA.agents)){
    const fn = a.functions.find(f=>f.id===id);
    if(fn) return {...fn, type:'function', parentAgent:a.id};
  }
  return null;
}

/* =========================================================
   SELECTION & DETAILS PANEL
   ========================================================= */
function selectNode(id, type){
  state.selected = id;
  renderMain();
  renderTree();
  openDetails(id);
}

function closeDetails(){
  state.selected = null;
  document.getElementById('workspace').classList.remove('right-open');
  renderMain();
  renderTree();
}

function openDetails(id){
  const node = resolveNode(id);
  if(!node){ return; }
  document.getElementById('workspace').classList.add('right-open');

  const accent = {
    core:'linear-gradient(135deg,#a78bfa,#7b5cff)',
    category: node.isPolicy ? 'linear-gradient(135deg,#4ade80,#22c55e)' : 'linear-gradient(135deg,#f472b6,#ec4899)',
    agent:'linear-gradient(135deg,#a78bfa,#7b5cff)',
    function:'linear-gradient(135deg,#fbbf24,#f59e0b)',
    policy:'linear-gradient(135deg,#4ade80,#22c55e)'
  }[node.type] || '#7b5cff';

  const head = document.getElementById('detHead');
  head.innerHTML = `
    <div class="det-ico" style="background:${accent}">${svgIcon(node.icon||ICON.bot,'svg svg-lg')}</div>
    <div>
      <div class="det-title">${node.name}</div>
      <div class="det-sub">${node.subtitle || typeLabel(node.type)}</div>
    </div>
    <button class="det-close" onclick="closeDetails()" title="Close">${svgIcon('i-x','svg')}</button>
  `;

  let body = '';
  if(node.description){
    body += `<div class="det-section"><h4>Description</h4><p>${node.description}</p></div>`;
  }
  if(node.tags && node.tags.length){
    body += `<div class="det-section"><h4>Tags</h4><div class="tag-row">${
      node.tags.map(t=>`<span class="tag ${t.cls||''}">${t.label}</span>`).join('')
    }</div></div>`;
  }
  if(node.meta && Object.keys(node.meta).length){
    body += `<div class="det-section"><h4>Properties</h4><div class="kv">${
      Object.entries(node.meta).map(([k,v])=>`<div class="k">${k}</div><div class="v">${v}</div>`).join('')
    }</div></div>`;
  }

  // Type-specific sections
  if(node.type==='agent'){
    body += `<div class="det-section"><h4>Functions</h4><div class="conn-list">${
      (node.functions||[]).map(fn=>connRow(fn,'function')).join('')
    }</div></div>`;
    // Policies that apply
    const applied = Object.values(DATA.policies).filter(p=>p.appliesTo.includes(node.id));
    if(applied.length){
      body += `<div class="det-section"><h4>Policies applied</h4><div class="conn-list">${
        applied.map(p=>connRow(p,'policy')).join('')
      }</div></div>`;
    }
  }
  if(node.type==='policy'){
    body += `<div class="det-section"><h4>Applies to agents</h4><div class="conn-list">${
      node.appliesTo.map(aid=>connRow(DATA.agents[aid],'agent')).join('')
    }</div></div>`;
    if(node.enforcedBy && node.enforcedBy.length){
      body += `<div class="det-section"><h4>Enforced by</h4><div class="conn-list">${
        node.enforcedBy.map(aid=>connRow(DATA.agents[aid],'agent')).join('')
      }</div></div>`;
    }
  }
  if(node.type==='function'){
    const parent = DATA.agents[node.parentAgent];
    if(parent){
      body += `<div class="det-section"><h4>Owning agent</h4><div class="conn-list">${connRow(parent,'agent')}</div></div>`;
    }
  }
  if(node.type==='category'){
    const items = node.isPolicy
      ? node.policies.map(pid=>DATA.policies[pid])
      : node.agents.map(aid=>DATA.agents[aid]);
    body += `<div class="det-section"><h4>${node.isPolicy?'Policies':'Agents'} in this category</h4><div class="conn-list">${
      items.map(it=>connRow(it, node.isPolicy?'policy':'agent')).join('')
    }</div></div>`;
  }
  if(node.type==='core'){
    body += `<div class="det-section"><h4>Connected</h4>
      <div class="conn-list">
        ${DATA.agentCategories.map(c=>connRow(c,'category')).join('')}
      </div></div>`;
  }

  document.getElementById('detBody').innerHTML = body;

  document.getElementById('detActions').innerHTML = `
    <button class="btn primary">${node.type==='policy'?'Edit policy':'Open in editor'}</button>
    <button class="btn">Run test</button>
    <button class="btn ghost" style="margin-left:auto" onclick="closeDetails()">Close</button>
  `;
}

function typeLabel(t){
  return ({core:'Core agent', agent:'AI Agent', policy:'Policy', function:'Function', category:'Category'})[t]||t;
}

function connRow(item, type){
  if(!item) return '';
  const bg = ({
    agent:'linear-gradient(135deg,#a78bfa,#7b5cff)',
    policy:'linear-gradient(135deg,#4ade80,#22c55e)',
    function:'linear-gradient(135deg,#fbbf24,#f59e0b)',
    category:'linear-gradient(135deg,#f472b6,#ec4899)'
  })[type] || '#7b5cff';
  return `
    <div class="conn" onclick="selectNode('${item.id}','${type}')">
      <div class="ic" style="background:${bg}">${svgIcon(item.icon||ICON.bot,'svg')}</div>
      <div class="nm">${item.name}</div>
      <div class="tp">${typeLabel(type)}</div>
    </div>
  `;
}

/* =========================================================
   TABS + ZOOM
   ========================================================= */
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.view = btn.dataset.view;
    state.selected = null;
    state.tableFilter = '';
    const ts = document.getElementById('tableSearch'); if(ts) ts.value='';
    document.getElementById('workspace').classList.remove('right-open');
    renderMain();
    renderTree();
  });
});

// View switcher (Sitemap / Table)
document.querySelectorAll('.view-switcher .vsw').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.view-switcher .vsw').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.canvasView = btn.dataset.cview;
    renderMain();
  });
});

// Table search
document.addEventListener('input',(e)=>{
  if(e.target && e.target.id==='tableSearch'){
    state.tableFilter = e.target.value;
    renderTable();
  }
});

function zoomBy(d){
  state.zoom = Math.min(2, Math.max(0.4, state.zoom + d));
  applyZoom();
}
function fitToScreen(){
  state.zoom = 1;
  applyZoom();
}
function applyZoom(){
  stage.style.transform = `scale(${state.zoom})`;
  edges.style.transform = `scale(${state.zoom})`;
  edges.style.transformOrigin = '0 0';
  document.getElementById('zoomReadout').textContent = Math.round(state.zoom*100)+'%';
  drawEdges();
}

/* =========================================================
   SEARCH IN LAYERS
   ========================================================= */
document.getElementById('layersSearch').addEventListener('input',(e)=>{
  const q = e.target.value.toLowerCase().trim();
  document.querySelectorAll('#layersTree .tree-item').forEach(el=>{
    if(!q){ el.style.display=''; return; }
    const txt = el.querySelector('.lbl').textContent.toLowerCase();
    el.style.display = txt.includes(q) ? '' : 'none';
  });
  if(q){
    document.querySelectorAll('#layersTree .tree-children').forEach(c=>c.classList.add('open'));
  }
});

/* =========================================================
   INIT
   ========================================================= */
window.addEventListener('resize', ()=>{ if(state.canvasView==='sitemap') drawEdges(); });
renderMain();
renderTree();
// Auto-select ELLMR on first load to showcase the right panel
setTimeout(()=>selectNode('ellmr','core'), 250);
</script>
</body>
</html>
